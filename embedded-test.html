<h2>D365 Embedded Form Test</h2>

<p>
<a href="?utm_source=google&utm_medium=cpc&utm_campaign=test_campaign&utm_term=test_term&utm_content=test_content">
Reload with UTM
</a>
</p>

<hr>

<div
  data-form-id="5213c6e7-6c19-f111-8342-002248a46be3"
  data-form-api-url="https://public-eur.mkt.dynamics.com/api/v1.0/orgs/92d36e3e-7511-f111-8c79-000d3ab8d769/landingpageforms"
  data-cached-form-url="https://assets-eur.mkt.dynamics.com/92d36e3e-7511-f111-8c79-000d3ab8d769/digitalassets/forms/5213c6e7-6c19-f111-8342-002248a46be3">
</div>

<script src="https://cxppusa1formui01cdnsa01-endpoint.azureedge.net/eur/FormLoader/FormLoader.bundle.js"></script>


<script>

(function() {
  // 1. Read UTM params from URL
  function getUTMs() {
    const params = new URLSearchParams(window.location.search);
    return {
      utm_source: params.get("utm_source") || "",
      utm_medium: params.get("utm_medium") || "",
      utm_campaign: params.get("utm_campaign") || "",
      utm_term: params.get("utm_term") || "",
      utm_content: params.get("utm_content") || ""
    };
  }

  // 2. Only continue if at least one REAL UTM exists
  function hasRealUTM(utms) {
    return ["utm_source", "utm_medium", "utm_campaign", "utm_term", "utm_content"]
      .some(k => utms[k] !== "");
  }

  // 3. Mapping → UTM parameter → D365 hidden field name
  const fieldMap = {
    utm_source: "cr994_utm_source",
    utm_medium: "cr994_utm_medium",
    utm_campaign: "cr994_utm_campaign",
    utm_term: "cr994_utm_term",
    utm_content: "cr994_utm_content"
  };

  // 4. Fill hidden fields inside a form document
  function fillUTMFields(formDoc) {
    const utms = getUTMs();
    if (!formDoc || !hasRealUTM(utms)) return false;

    let filled = false;

    Object.keys(fieldMap).forEach(key => {
      const selector = `[name="${fieldMap[key]}"]`;
      const input = formDoc.querySelector(selector);

      if (input && utms[key]) {
        input.value = utms[key];
        input.dispatchEvent(new Event("change", {
          bubbles: true
        }));
        filled = true;
      }
    });

    return filled;
  }

  // 5. Retry logic to ensure fields are filled when form loads slowly
  function tryFill(formDoc, attempts = 8) {
    if (attempts <= 0) return;

    const success = fillUTMFields(formDoc);

    if (!success) {
      setTimeout(() => tryFill(formDoc, attempts - 1), 350);
    }
  }

  // 6. When form loads INSIDE Dynamics (no iframe)
  document.addEventListener("d365mkt-afterformload", () => {
    tryFill(document);
  });

  // 7. When form loads inside an EMBED iframe
  window.addEventListener("message", event => {
    if (event.data?.type === "d365mkt-afterformload") {

      // Try to locate the iframe safely (Cross-browser compatible)
      let iframe = document.querySelector("iframe[src*='dynamics'], iframe[src*='forms.microsoft.com']");

      if (iframe) {
        try {
          const iframeDoc = iframe.contentWindow.document;
          tryFill(iframeDoc);
          return;
        } catch (e) {
          // If Firefox/Edge block access → fallback
        }
      }

      // Fallback: fill on parent if iframe not accessible
      tryFill(document);
    }
  });
})();

</script>

</body>
</html>
