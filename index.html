<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>D365 Form Capture Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    form {
      width: 320px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 12px;
    }
  </style>
</head>

<body>

  <h2>Test HTML Form</h2>

  <form id="leadForm">
    <input type="text" id="firstname" name="firstname" placeholder="First name" required>
    <input type="text" id="lastname" name="lastname" placeholder="Last name" required>
    <input type="email" id="email" name="email" placeholder="Email" required>
    <input type="text" id="mobilephone" name="mobilephone" placeholder="Phone">
    <input type="text" id="companyname" name="companyname" placeholder="Company">
    <input type="text" id="jobtitle" name="jobtitle" placeholder="Job title">

    <input type="hidden" name="cmf_utm_source" id="utm_source">
    <input type="hidden" name="cmf_utm_medium" id="utm_medium">
    <input type="hidden" name="cmf_utm_campaign" id="utm_campaign">
    <input type="hidden" name="cmf_utm_term" id="utm_term">
    <input type="hidden" name="cmf_utm_content" id="utm_content">

    <button type="submit">Submit</button>
  </form>

  <script src="https://cxppusa1formui01cdnsa01-endpoint.azureedge.net/eur/FormCapture/FormCapture.bundle.js"></script>

  <script>
    d365mktformcapture.waitForElement("#leadForm").then((form) => {
      const params = new URLSearchParams(window.location.search);

      document.getElementById("utm_source").value = params.get("utm_source");
      document.getElementById("utm_medium").value = params.get("utm_medium");
      document.getElementById("utm_campaign").value = params.get("utm_campaign");
      document.getElementById("utm_term").value = params.get("utm_term");
      document.getElementById("utm_content").value = params.get("utm_content");
      
      const mappings = [
        {
          FormFieldName: "firstname",
          DataverseFieldName: "firstname"
        },
        {
          FormFieldName: "lastname",
          DataverseFieldName: "lastname"
        },
        {
          FormFieldName: "email",
          DataverseFieldName: "emailaddress1"
        },
        {
          FormFieldName: "mobilephone",
          DataverseFieldName: "mobilephone"
        },
        {
          FormFieldName: "companyname",
          DataverseFieldName: "companyname"
        },
        {
          FormFieldName: "jobtitle",
          DataverseFieldName: "jobtitle"
        },
        {
           FormFieldName: "cmf_utm_source",
           DataverseFieldName: "cmf_utm_source"
        },
        {
           FormFieldName: "cmf_utm_medium",
           DataverseFieldName: "cmf_utm_medium"
        },
        {
           FormFieldName: "cmf_utm_campaign",
           DataverseFieldName: "cmf_utm_campaign"
        },
        {
           FormFieldName: "cmf_utm_term",
           DataverseFieldName: "cmf_utm_term"
        },
        {
           FormFieldName: "cmf_utm_content",
           DataverseFieldName: "cmf_utm_content"
        }
      ];

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const serializedForm = d365mktformcapture.serializeForm(form, mappings);
        console.log("Serialized form:", serializedForm);

        const payload = serializedForm.SerializedForm.build();
        console.log("Payload sent to Dynamics:", payload);

        const captureConfig = {
          FormId: "5213c6e7-6c19-f111-8342-002248a46be3",
          FormApiUrl: "https://public-eur.mkt.dynamics.com/api/v1.0/orgs/92d36e3e-7511-f111-8c79-000d3ab8d769/landingpageforms"
        };

        d365mktformcapture.submitForm(captureConfig, payload);
      }, true);
    });
  </script>

</body>
</html>
